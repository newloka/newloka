<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>New Loka — EMR & Patient Management</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="manifest" href="/static/assets/manifest.json">
</head>
<body>
    <div id="app">
        <div id="offline-banner" class="offline-banner hidden" role="status" aria-live="polite">Offline</div>
        <div id="alert-bar" class="alert-bar hidden"></div>
        <header id="app-header" class="app-header hidden">
            <button id="menu-btn" class="icon-btn" aria-label="Open menu">☰</button>
            <h1 class="app-title">New Loka</h1>
            <div class="header-actions">
                <button id="search-toggle" class="icon-btn" aria-label="Search">🔍</button>
                <button id="quick-add-btn" class="icon-btn" aria-label="Quick add">＋</button>
            </div>
        </header>
        <nav id="side-nav" class="side-nav">
            <div class="nav-header">
                <strong>New Loka</strong>
                <span id="tier-badge" class="tier-badge">T1</span>
                <button id="close-nav" class="icon-btn" aria-label="Close menu">✕</button>
            </div>
            <ul class="nav-list">
                <li><a href="#dashboard" data-view="dashboard">Dashboard</a></li>
                <li><a href="#patients" data-view="patients">Patients</a></li>
                <li><a href="#encounters" data-view="encounters">Encounters</a></li>
                <li><a href="#observations" data-view="observations">Observations</a></li>
                <li><a href="#conditions" data-view="conditions">Conditions</a></li>
                <li><a href="#medications" data-view="medications">Medications</a></li>
                <li><a href="#procedures" data-view="procedures">Procedures</a></li>
                <li><a href="#ingest" data-view="ingest">Ingest</a></li>
                <li><a href="#handoff" data-view="handoff">Handoff</a></li>
                <li><a href="#audit" data-view="audit">Audit</a></li>
                <li><a href="#settings" data-view="settings">Settings</a></li>
            </ul>
            <div class="nav-footer">
                <small id="node-id">Node: —</small>
                <small id="sync-status">Sync: —</small>
            </div>
        </nav>
        <main id="main-content" class="main-content">
            <div id="view-container"></div>
        </main>
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal" role="dialog" aria-modal="true">
                <div class="modal-header">
                    <h3 id="modal-title">Modal</h3>
                    <button id="modal-close" class="icon-btn" aria-label="Close">✕</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/static/js/mock-data.js"></script>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
