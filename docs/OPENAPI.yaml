  /AuditEvent:
    get:
      summary: Query audit log
      parameters:
        - name: _count
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Bundle of audit events
    post:
      summary: Record audit event
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201':
          description: Audit event recorded

  /sync/manifest:
    get:
      summary: Node sync manifest
      responses:
        '200':
          description: Manifest

  /sync/delta:
    post:
      summary: Delta sync
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Delta sync response
