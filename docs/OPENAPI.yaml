openapi: 3.0.3
info:
  title: New Loka API
  description: Local-first health data management FHIR R4 API
  version: 0.1.0
  contact:
    name: New Loka Contributors
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /:
    get:
      summary: Service root
      responses:
        '200':
          description: Service information

  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  version: { type: string }
                  node_id: { type: string }
                  tier: { type: string }

  /metadata:
    get:
      summary: FHIR CapabilityStatement
      responses:
        '200':
          description: Capability statement

  /seed:
    post:
      summary: Seed mock data
      parameters:
        - name: count
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Seed status

  /Patient:
    get:
      summary: Search patients
      parameters:
        - name: patient
          in: query
          schema: { type: string }
        - name: _count
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Bundle of patients
    post:
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201':
          description: Patient created

  /Patient/{id}:
    get:
      summary: Read patient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Patient
        '404':
          description: Not found
    put:
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Patient updated
    delete:
      summary: Soft delete patient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted

  /Encounter:
    get:
      summary: Search encounters
      parameters:
        - name: patient
          in: query
          schema: { type: string }
        - name: _count
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Bundle of encounters
    post:
      summary: Create encounter
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201':
          description: Encounter created

  /Encounter/{id}:
    get:
      summary: Read encounter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Encounter
        '404':
          description: Not found
    put:
      summary: Update encounter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Encounter updated
    delete:
      summary: Delete encounter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted

